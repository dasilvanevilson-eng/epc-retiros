<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encontro de Pais com Cristo -Indaial!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="divulgacao.css" />
  </head>
  <body>
    <main class="site-stage" id="topo">
      <nav class="top-actions" aria-label="Acesso principal">
        <a class="restricted-link" href="epc-retiros.html#inicio">Área Restrita</a>
      </nav>

      <section class="welcome-orbit" aria-labelledby="site-title">
        <div class="sky" aria-hidden="true"></div>
        <header class="welcome-heading">
          <span class="branch left"></span>
          <div class="title-stack">
            <h1 id="site-title">Encontro de Pais com Cristo</h1>
            <p>Família unida filhos com vida!</p>
            <p class="parish-line">Paróquia Santa Inês - Indaial</p>
          </div>
          <span class="branch right"></span>
        </header>

        <div class="orbit-map" aria-label="Movimentos da família EPC">
          <div class="gold-line line-left-top"></div>
          <div class="gold-line line-left-middle"></div>
          <div class="gold-line line-left-bottom"></div>
          <div class="gold-line line-right-top"></div>
          <div class="gold-line line-right-middle"></div>
          <div class="gold-line line-right-bottom"></div>
          <a class="movement-button movement-eja" href="movimento.html?id=eja" aria-label="Abrir página do EJA">
            <img class="movement-image" src="assets/eja.png" alt="" />
            <span class="movement-logo logo-eja"><strong>eja</strong><small>Jovens Amigos</small></span>
          </a>
          <a class="movement-button movement-onda" href="movimento.html?id=onda" aria-label="Abrir página do ONDA">
            <img class="movement-image" src="assets/onda.png" alt="" />
            <span class="movement-logo logo-onda"><strong>ONDA</strong><small>Objetivos Novos</small></span>
          </a>
          <a class="movement-button movement-epc" href="movimento.html?id=epc" aria-label="Abrir página do EPC">
            <img class="movement-image" src="assets/epc.png" alt="" />
            <span class="movement-logo logo-epc"><strong>EPC</strong><small>Pais com Cristo</small></span>
          </a>
          <a class="movement-button movement-eju" href="movimento.html?id=eju" aria-label="Abrir página do EJU">
            <img class="movement-image" src="assets/eju.png" alt="" />
            <span class="movement-logo logo-eju"><strong>eju</strong><small>Indaial-SC</small></span>
          </a>
          <a class="movement-button movement-pastor" href="movimento.html?id=o-senhor-e-meu-pastor" aria-label="Abrir página O Senhor é meu Pastor">
            <img class="movement-image" src="assets/pastor.png" alt="" />
            <span class="movement-logo logo-pastor"><strong>O Senhor</strong><small>é meu Pastor</small></span>
          </a>
          <a class="movement-button movement-girassol" href="movimento.html?id=girassol" aria-label="Abrir página do Girassol">
            <img class="movement-image" src="assets/girassol.png" alt="" />
            <span class="movement-logo logo-girassol"><strong>Girassol</strong><small>Ama pra valer</small></span>
          </a>

          <a class="main-devotion" href="movimento.html?id=eis-me-aqui" aria-label="Abrir página do Eis-me Aqui">
            <img src="assets/clean/eis-me-aqui-central.png" alt="Eis-me Aqui" />
            <span class="central-fallback">Eis-me Aqui</span>
          </a>
        </div>

        <footer class="welcome-footer">
          <span class="heart" aria-hidden="true"></span>
        </footer>
      </section>
    </main>
    <script type="module" src="divulgacao.js"></script>
  </body>
</html>
